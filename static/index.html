<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Xandaris — Star Map</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#x2B50;</text></svg>">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; color: #ccc; font-family: 'Courier New', monospace; overflow: hidden; }
canvas { display: block; }

#hud {
  position: absolute; top: 16px; left: 16px;
  font-size: 12px; opacity: 0.7;
}

#tooltip {
  position: absolute; pointer-events: none; display: none;
  background: rgba(0,0,0,0.85); border: 1px solid #444;
  padding: 6px 10px; border-radius: 4px; font-size: 12px;
  white-space: nowrap;
}

#panel {
  position: absolute; top: 16px; right: 16px; width: 320px;
  background: rgba(8,8,16,0.92); border: 1px solid #333;
  border-radius: 8px; padding: 16px; display: none;
  max-height: calc(100vh - 32px); overflow-y: auto;
  font-size: 13px; line-height: 1.6;
}
#panel h2 { color: #fff; font-size: 16px; margin-bottom: 8px; }
#panel h3 { color: #aaa; font-size: 13px; margin: 12px 0 4px; border-bottom: 1px solid #333; padding-bottom: 2px; cursor: pointer; user-select: none; }
#panel h3:hover { color: #ddd; }
#panel h3::before { content: '\u25bc '; font-size: 9px; }
#panel h3.collapsed::before { content: '\u25b6 '; }
#panel .section.collapsed { display: none; }
#panel .row { display: flex; justify-content: space-between; }
#panel .label { color: #666; }
#panel .val { color: #eee; }
#panel .star-block { margin: 8px 0; padding: 8px; background: rgba(255,255,255,0.03); border-radius: 4px; }
#panel .close { position: absolute; top: 8px; right: 12px; cursor: pointer; color: #666; font-size: 18px; }
#panel .close:hover { color: #fff; }

#legend {
  position: absolute; bottom: 16px; left: 16px;
  font-size: 11px; opacity: 0.7;
}
#legend .swatch {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; margin-right: 4px; vertical-align: middle;
}
#legend span { margin-right: 12px; }

@keyframes notifSlide {
  0% { opacity: 0; transform: translateY(20px); }
  15% { opacity: 1; transform: translateY(0); }
  80% { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-20px); }
}

#controls-hint {
  position: absolute; bottom: 16px; right: 16px;
  font-size: 11px; opacity: 0.4;
}
</style>
</head>
<body>
<div id="hud">Loading...</div>
<div id="tooltip"></div>
<div id="panel"></div>
<div id="discoveries" style="position:absolute;top:16px;left:16px;margin-top:30px;width:280px;background:rgba(8,8,16,0.92);border:1px solid #333;border-radius:8px;padding:12px;display:none;font-size:12px;line-height:1.6;max-height:60vh;overflow-y:auto">
  <div style="color:#888;margin-bottom:4px">DISCOVERY LOG <span style="float:right;cursor:pointer;color:#555" onclick="this.parentElement.parentElement.style.display='none'">&times;</span></div>
  <div id="disc-content"></div>
</div>
<div id="legend">
  <span><i class="swatch" style="background:#f48042"></i>M</span>
  <span><i class="swatch" style="background:#ffb570"></i>K</span>
  <span><i class="swatch" style="background:#ffe0b0"></i>G</span>
  <span><i class="swatch" style="background:#fff5e6"></i>F</span>
  <span><i class="swatch" style="background:#eef0ff"></i>A</span>
  <span><i class="swatch" style="background:#b0c0ff"></i>B</span>
  <span><i class="swatch" style="background:#8099ff"></i>O</span>
</div>
<div id="search-box" style="position:absolute;top:50px;left:50%;transform:translateX(-50%);display:none;z-index:10">
  <input id="search-input" type="text" placeholder="Search systems..." style="
    width:300px;padding:8px 14px;background:rgba(8,8,16,0.95);color:#eee;
    border:1px solid #444;border-radius:6px;font-family:inherit;font-size:14px;
    outline:none;
  ">
  <div id="search-results" style="
    max-height:200px;overflow-y:auto;margin-top:4px;background:rgba(8,8,16,0.95);
    border:1px solid #333;border-radius:6px;display:none;
  "></div>
</div>
<div id="notif-container" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:10"></div>
<div id="galaxy-stats" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:400px;background:rgba(8,8,16,0.95);border:1px solid #333;border-radius:12px;padding:20px;display:none;font-size:13px;line-height:1.8;z-index:5">
  <div style="text-align:center;color:#888;margin-bottom:8px;font-size:11px">GALAXY OVERVIEW <span style="float:right;cursor:pointer;color:#555" onclick="this.parentElement.parentElement.style.display='none'">&times;</span></div>
  <div id="galaxy-stats-content"></div>
</div>
<div id="empire-panel" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:420px;background:rgba(8,8,16,0.95);border:1px solid #3a5a3a;border-radius:12px;padding:20px;display:none;font-size:13px;line-height:1.8;z-index:5;max-height:80vh;overflow-y:auto">
  <div style="text-align:center;color:#4b4;margin-bottom:8px;font-size:11px">MY EMPIRE <span style="float:right;cursor:pointer;color:#555" onclick="this.parentElement.parentElement.style.display='none'">&times;</span></div>
  <div id="empire-content"></div>
</div>
<div id="controls-hint">WASD hop | Tab planets | / search | R random | E empire | L log | G stats | 1-7 filter | Esc back</div>

<script type="importmap">
{ "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
}}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const API = window.location.origin;
const PLANET_API = 'http://localhost:8082';

// -- Stellar color --
const COLOR_TABLE = [
  [2000,  [1.00, 0.50, 0.26]], [3500,  [1.00, 0.71, 0.44]],
  [5000,  [1.00, 0.88, 0.69]], [5800,  [1.00, 0.96, 0.90]],
  [7000,  [0.93, 0.94, 1.00]], [10000, [0.69, 0.75, 1.00]],
  [20000, [0.50, 0.60, 1.00]], [40000, [0.44, 0.53, 1.00]],
];

function tempToRGB(temp) {
  if (temp <= COLOR_TABLE[0][0]) return COLOR_TABLE[0][1];
  for (let i = 0; i < COLOR_TABLE.length - 1; i++) {
    const [t0, c0] = COLOR_TABLE[i], [t1, c1] = COLOR_TABLE[i + 1];
    if (temp <= t1) {
      const t = (temp - t0) / (t1 - t0);
      return [c0[0]+(c1[0]-c0[0])*t, c0[1]+(c1[1]-c0[1])*t, c0[2]+(c1[2]-c0[2])*t];
    }
  }
  return COLOR_TABLE[COLOR_TABLE.length - 1][1];
}

function rgbHex(rgb) {
  return '#' + rgb.map(c => Math.round(c * 255).toString(16).padStart(2, '0')).join('');
}

// -- Scene --
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 200000);
camera.position.set(0, 6000, 14000);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(devicePixelRatio);
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.minDistance = 5;
controls.maxDistance = 100000;

// Background dust
const bgGeo = new THREE.BufferGeometry();
const bgPos = new Float32Array(3000 * 3);
for (let i = 0; i < bgPos.length; i++) bgPos[i] = (Math.random() - 0.5) * 80000;
bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({ color: 0x333344, size: 1 })));

// Grid
const grid = new THREE.GridHelper(20000, 20, 0x111122, 0x0a0a15);
grid.material.transparent = true; grid.material.opacity = 0.3;
scene.add(grid);

// Origin
const originRing = new THREE.Mesh(
  new THREE.RingGeometry(30, 35, 32),
  new THREE.MeshBasicMaterial({ color: 0x334455, side: THREE.DoubleSide, transparent: true, opacity: 0.5 })
);
originRing.rotation.x = -Math.PI / 2;
scene.add(originRing);

// -- Load data --
const [systemsRaw, starsRaw] = await Promise.all([
  fetch(`${API}/systems/nearest?x=0&y=0&z=0&limit=2000`).then(r => r.json()),
  fetch(`${API}/stars/nearest?x=0&y=0&z=0&limit=5000`).then(r => r.json()),
]);

const starsByPos = {};
for (const star of starsRaw) {
  const key = `${star.pos_x},${star.pos_y},${star.pos_z}`;
  (starsByPos[key] ||= []).push(star);
}

const systems = systemsRaw.map(sys => {
  const key = `${sys.pos_x},${sys.pos_y},${sys.pos_z}`;
  const sysStars = starsByPos[key] || [];
  const primary = sysStars.reduce((a, b) => (a && a.mass > b.mass) ? a : b, sysStars[0]);
  return { ...sys, _temp: primary?.temp || 5000, _lum: primary?.luminosity || 1000, _count: sysStars.length };
});

// -- Point cloud --
const count = systems.length;
const positions = new Float32Array(count * 3);
const colors = new Float32Array(count * 3);
const sizes = new Float32Array(count);

function sysWorldPos(s) { return new THREE.Vector3(s.pos_x, s.pos_z * 3, s.pos_y); }

for (let i = 0; i < count; i++) {
  const s = systems[i];
  const p = sysWorldPos(s);
  positions[i*3] = p.x; positions[i*3+1] = p.y; positions[i*3+2] = p.z;
  const [r, g, b] = tempToRGB(s._temp);
  colors[i*3] = r; colors[i*3+1] = g; colors[i*3+2] = b;
  sizes[i] = 4 + Math.log10(Math.max(1, s._lum)) * 3;
}

const pointsGeo = new THREE.BufferGeometry();
pointsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
pointsGeo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
pointsGeo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

const pointsMat = new THREE.ShaderMaterial({
  vertexColors: true, transparent: true, depthWrite: false, uniforms: {},
  vertexShader: `
    attribute float size; varying vec3 vColor;
    void main() {
      vColor = color;
      vec4 mv = modelViewMatrix * vec4(position, 1.0);
      gl_PointSize = size * (3000.0 / -mv.z);
      gl_Position = projectionMatrix * mv;
    }`,
  fragmentShader: `
    varying vec3 vColor;
    void main() {
      float d = length(gl_PointCoord - 0.5) * 2.0;
      if (d > 1.0) discard;
      float glow = exp(-d * d * 3.0);
      float core = smoothstep(0.5, 0.0, d);
      vec3 col = vColor * (glow * 0.6 + core * 0.8);
      gl_FragColor = vec4(col, glow * 0.7 + core * 0.5);
    }`
});

const pointCloud = new THREE.Points(pointsGeo, pointsMat);
scene.add(pointCloud);

// ============================================================
// JUMP LANES — subtle lines between nearby systems
// ============================================================
const LANE_MAX_DIST = 1500;
const LANE_MAX_PER = 3;
const laneConnections = new Array(count).fill(null).map(() => []);

{
  const lanePositions = [];

  for (let i = 0; i < count; i++) {
    const pi = sysWorldPos(systems[i]);
    const dists = [];
    for (let j = i + 1; j < count; j++) {
      const pj = sysWorldPos(systems[j]);
      const d = pi.distanceTo(pj);
      if (d < LANE_MAX_DIST) dists.push({ j, d });
    }
    dists.sort((a, b) => a.d - b.d);

    for (const { j } of dists.slice(0, LANE_MAX_PER)) {
      if (laneConnections[i].length >= LANE_MAX_PER || laneConnections[j].length >= LANE_MAX_PER) continue;
      laneConnections[i].push(j);
      laneConnections[j].push(i);
      const pi2 = sysWorldPos(systems[i]);
      const pj2 = sysWorldPos(systems[j]);
      lanePositions.push(pi2.x, pi2.y, pi2.z, pj2.x, pj2.y, pj2.z);
    }
  }

  if (lanePositions.length > 0) {
    const laneGeo = new THREE.BufferGeometry();
    laneGeo.setAttribute('position', new THREE.Float32BufferAttribute(lanePositions, 3));
    const laneMat = new THREE.LineBasicMaterial({
      color: 0x1a2233, transparent: true, opacity: 0.15, depthWrite: false
    });
    scene.add(new THREE.LineSegments(laneGeo, laneMat));
  }
}

// Active lane highlights — bright lines showing WASD neighbors from current system
const laneHighlightGroup = new THREE.Group();
laneHighlightGroup.visible = false;
scene.add(laneHighlightGroup);

function showLaneHighlights(sysIdx) {
  while (laneHighlightGroup.children.length) laneHighlightGroup.remove(laneHighlightGroup.children[0]);
  if (sysIdx < 0) { laneHighlightGroup.visible = false; return; }

  const from = sysWorldPos(systems[sysIdx]);

  // Get camera directions for labeling
  const camFwd = new THREE.Vector3();
  camera.getWorldDirection(camFwd);
  camFwd.y = 0; camFwd.normalize();
  const camRight = new THREE.Vector3().crossVectors(camFwd, new THREE.Vector3(0, 1, 0)).normalize();

  // Show lanes to all connected neighbors
  for (const neighborIdx of laneConnections[sysIdx]) {
    const to = sysWorldPos(systems[neighborIdx]);
    const delta = to.clone().sub(from);
    delta.y = 0;
    delta.normalize();

    // Determine which WASD direction this neighbor is in
    const fwdDot = delta.dot(camFwd);
    const rightDot = delta.dot(camRight);
    let dirLabel = '';
    let color = 0x335566;
    if (Math.abs(fwdDot) > Math.abs(rightDot)) {
      dirLabel = fwdDot > 0 ? 'W' : 'S';
      color = fwdDot > 0 ? 0x4488aa : 0x886644;
    } else {
      dirLabel = rightDot > 0 ? 'D' : 'A';
      color = rightDot > 0 ? 0x448866 : 0x664488;
    }

    // Bright lane line
    const pts = [from.clone(), to.clone()];
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    const mat = new THREE.LineBasicMaterial({ color, transparent: true, opacity: 0.5, depthWrite: false });
    laneHighlightGroup.add(new THREE.Line(geo, mat));

    // Small label at midpoint showing the neighbor name
    const mid = from.clone().lerp(to, 0.5);
    const visited = visitedSystems.has(neighborIdx);
    const labelCol = visited ? '#446655' : '#667788';
    const sysName = systems[neighborIdx].name;
    const c = document.createElement('canvas');
    c.width = 256; c.height = 48;
    const ctx = c.getContext('2d');
    ctx.font = 'bold 20px Courier New';
    ctx.fillStyle = labelCol;
    ctx.textAlign = 'center';
    ctx.fillText(`[${dirLabel}] ${sysName}`, 128, 32);
    const sprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, depthTest: false })
    );
    sprite.scale.set(200, 38, 1);
    sprite.position.copy(mid);
    sprite.position.y += 40;
    laneHighlightGroup.add(sprite);
  }

  laneHighlightGroup.visible = true;
}

function hideLaneHighlights() {
  while (laneHighlightGroup.children.length) laneHighlightGroup.remove(laneHighlightGroup.children[0]);
  laneHighlightGroup.visible = false;
}

// ============================================================
// ZONE VISUALIZATION
// ============================================================
const ZONE_SCALE = 80; // 1 AU = 80 scene units
const zoneGroup = new THREE.Group();
zoneGroup.visible = false;
scene.add(zoneGroup);

function makeCircle(radius, color, opacity) {
  const pts = [];
  for (let i = 0; i <= 128; i++) {
    const a = (i / 128) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  return new THREE.Line(
    new THREE.BufferGeometry().setFromPoints(pts),
    new THREE.LineBasicMaterial({ color, transparent: true, opacity, depthWrite: false })
  );
}

function makeBand(innerR, outerR, color, opacity) {
  const mesh = new THREE.Mesh(
    new THREE.RingGeometry(innerR, outerR, 96),
    new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity, depthWrite: false })
  );
  mesh.rotation.x = -Math.PI / 2;
  return mesh;
}

function makeLabel(text, x, z, color) {
  const c = document.createElement('canvas');
  c.width = 512; c.height = 64;
  const ctx = c.getContext('2d');
  ctx.font = 'bold 28px Courier New';
  ctx.fillStyle = color;
  ctx.textAlign = 'center';
  ctx.fillText(text, 256, 44);
  const sprite = new THREE.Sprite(
    new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, depthTest: false })
  );
  sprite.scale.set(140, 18, 1);
  sprite.position.set(x, 20, z);
  return sprite;
}

function makeStarMesh(radiusSolar, temp) {
  const r = Math.max(1.5, Math.sqrt(radiusSolar / 1000) * 5);
  const [cr, cg, cb] = tempToRGB(temp);
  const col = new THREE.Color(cr, cg, cb);

  const group = new THREE.Group();

  // Solid core
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(r, 32, 32),
    new THREE.MeshBasicMaterial({ color: col })
  ));

  // Glow — additive blended sphere, no depth writes
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(r * 3, 32, 32),
    new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 0.12,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  ));
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(r * 6, 32, 32),
    new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 0.04,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  ));

  return group;
}

function showZones(center, starsData) {
  while (zoneGroup.children.length) zoneGroup.remove(zoneGroup.children[0]);
  zoneGroup.position.copy(center);

  const primary = starsData.find(s => s.is_primary) || starsData[0];
  if (!primary) return;

  // Find companion if binary
  const companion = starsData.find(s => !s.is_primary);

  // Total binary separation = primary SMA + companion SMA (both orbit barycenter)
  let totalSepAU = 0;
  let primaryOffset = 0;
  let companionOffset = 0;
  if (companion) {
    const pSMA = (primary.semi_major_axis || 0) / 1000;
    const cSMA = (companion.semi_major_axis || 0) / 1000;
    totalSepAU = pSMA + cSMA;
    // Place primary left of center, companion right
    primaryOffset = -pSMA;
    companionOffset = cSMA;
  }

  // Primary star
  const primaryMesh = makeStarMesh(primary.radius || 1000, primary.temp);
  primaryMesh.position.set(primaryOffset * ZONE_SCALE, 0, 0);
  zoneGroup.add(primaryMesh);

  // Primary name label
  const pRgb = tempToRGB(primary.temp);
  zoneGroup.add(makeLabel(
    `${primary.star_name} (${primary.spectral_name}${primary.luminosity_numeral})`,
    primaryOffset * ZONE_SCALE, -25, rgbHex(pRgb)
  ));

  // Primary habitable zone
  const hzIn = primary.habitable_inner / 1000;
  const hzOut = primary.habitable_outer / 1000;
  if (hzIn > 0 && hzOut > 0) {
    const band = makeBand(hzIn * ZONE_SCALE, hzOut * ZONE_SCALE, 0x22aa44, 0.1);
    band.position.x = primaryOffset * ZONE_SCALE;
    zoneGroup.add(band);
    zoneGroup.add(makeCircle(hzIn * ZONE_SCALE, 0x22aa44, 0.35).translateX(primaryOffset * ZONE_SCALE));
    zoneGroup.add(makeCircle(hzOut * ZONE_SCALE, 0x22aa44, 0.35).translateX(primaryOffset * ZONE_SCALE));
    zoneGroup.add(makeLabel(
      `HZ ${hzIn.toFixed(2)}\u2013${hzOut.toFixed(2)} AU`,
      primaryOffset * ZONE_SCALE, (hzOut * ZONE_SCALE + 20), '#22aa44'
    ));
  }

  // Primary frost line
  const fl = primary.frost_line / 1000;
  if (fl > 0) {
    zoneGroup.add(makeCircle(fl * ZONE_SCALE, 0x4488cc, 0.4).translateX(primaryOffset * ZONE_SCALE));
    zoneGroup.add(makeLabel(`Frost ${fl.toFixed(2)} AU`, primaryOffset * ZONE_SCALE, (fl * ZONE_SCALE + 20), '#4488cc'));
  }

  // Companion star
  if (companion && totalSepAU > 0) {
    const compMesh = makeStarMesh(companion.radius || 500, companion.temp);
    compMesh.position.set(companionOffset * ZONE_SCALE, 0, 0);
    zoneGroup.add(compMesh);

    // Companion label
    const cRgb = tempToRGB(companion.temp);
    zoneGroup.add(makeLabel(
      `${companion.star_name} (${companion.spectral_name}${companion.luminosity_numeral})`,
      companionOffset * ZONE_SCALE, -25, rgbHex(cRgb)
    ));

    // Companion HZ
    const cHzIn = companion.habitable_inner / 1000;
    const cHzOut = companion.habitable_outer / 1000;
    if (cHzIn > 0 && cHzOut > 0) {
      const cBand = makeBand(cHzIn * ZONE_SCALE, cHzOut * ZONE_SCALE, 0x227744, 0.07);
      cBand.position.x = companionOffset * ZONE_SCALE;
      zoneGroup.add(cBand);
      zoneGroup.add(makeCircle(cHzIn * ZONE_SCALE, 0x227744, 0.25).translateX(companionOffset * ZONE_SCALE));
      zoneGroup.add(makeCircle(cHzOut * ZONE_SCALE, 0x227744, 0.25).translateX(companionOffset * ZONE_SCALE));
    }

    // Companion frost line
    const cFl = companion.frost_line / 1000;
    if (cFl > 0) {
      zoneGroup.add(makeCircle(cFl * ZONE_SCALE, 0x336688, 0.25).translateX(companionOffset * ZONE_SCALE));
    }

    // Binary orbit circle (centered on barycenter = group origin)
    zoneGroup.add(makeCircle(totalSepAU * ZONE_SCALE * 0.5, 0x555555, 0.15));
    zoneGroup.add(makeLabel(`sep ${totalSepAU.toFixed(1)} AU`, 0, (totalSepAU * ZONE_SCALE * 0.5 + 20), '#666666'));
  }

  zoneGroup.visible = true;
}

function hideZones() {
  zoneGroup.visible = false;
  planetMeshes.length = 0;
}

// ============================================================
// PLANET VISUALIZATION
// ============================================================
const planetMeshes = []; // for raycasting clicks

const WATER_STATES = { 0: 'none', 1: 'liquid', 2: 'ice', 3: 'vapor' };

function planetColor(p) {
  const cls = p.class_name;
  if (cls === 'gas_giant')  return new THREE.Color(0.85, 0.65, 0.35);
  if (cls === 'ice_giant')  return new THREE.Color(0.45, 0.7, 0.85);
  const hab = p.cached_habitability || 0;
  const ws = p.water_state;
  if (ws === 1 && hab > 7000) return new THREE.Color(0.25, 0.65, 0.4);  // habitable green-blue
  if (ws === 1)               return new THREE.Color(0.3, 0.5, 0.7);    // wet blue
  if (ws === 2)               return new THREE.Color(0.75, 0.82, 0.9);  // icy white
  if (ws === 3)               return new THREE.Color(0.8, 0.5, 0.3);    // hot vapor
  const t = p.cached_surface_temp || 300;
  if (t > 500) return new THREE.Color(0.75, 0.4, 0.25);  // scorched
  if (t < 150) return new THREE.Color(0.55, 0.55, 0.6);  // frozen rock
  return new THREE.Color(0.6, 0.5, 0.4);                  // barren
}

function planetVisualRadius(p) {
  const r = (p.cached_radius || 1000) / 1000; // earth radii
  const cls = p.class_name;
  if (cls === 'gas_giant')  return Math.max(6, Math.sqrt(r) * 2.5);
  if (cls === 'ice_giant')  return Math.max(4, Math.sqrt(r) * 2);
  return Math.max(1.5, Math.pow(r, 0.6) * 2);
}

function makePlanetMesh(planet) {
  const r = planetVisualRadius(planet);
  const col = planetColor(planet);
  const group = new THREE.Group();

  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(r, 24, 24),
    new THREE.MeshBasicMaterial({ color: col })
  ));

  // Subtle glow
  group.add(new THREE.Mesh(
    new THREE.SphereGeometry(r * 2, 16, 16),
    new THREE.MeshBasicMaterial({
      color: col, transparent: true, opacity: 0.08,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  ));

  // Ring for gas giants
  if (planet.class_name === 'gas_giant' && (planet.id % 3 === 0)) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(r * 1.4, r * 2.0, 48),
      new THREE.MeshBasicMaterial({ color: 0x998866, side: THREE.DoubleSide, transparent: true, opacity: 0.3, depthWrite: false })
    );
    ring.rotation.x = Math.PI * 0.4;
    group.add(ring);
  }

  group.userData.planet = planet;
  return group;
}

function addPlanetsToZones(planets, primaryOffsetAU) {
  planetMeshes.length = 0;

  // Index moons by parent ID
  const moonsByParent = {};
  for (const p of planets) {
    if (p.id_parent) {
      (moonsByParent[p.id_parent] ||= []).push(p);
    }
  }

  for (const planet of planets) {
    if (planet.id_parent) continue; // moons rendered with their parent

    const orbitAU = planet.semi_major_axis / 1000;
    const orbitR = orbitAU * ZONE_SCALE;

    // Orbit track
    zoneGroup.add(makeCircle(orbitR, 0x444444, 0.2).translateX(primaryOffsetAU * ZONE_SCALE));

    // Place planet at its mean anomaly angle
    const angle = (planet.mean_anomaly / 100) * (Math.PI / 180);
    const px = primaryOffsetAU * ZONE_SCALE + Math.cos(angle) * orbitR;
    const pz = Math.sin(angle) * orbitR;

    const mesh = makePlanetMesh(planet);
    mesh.position.set(px, 0, pz);
    zoneGroup.add(mesh);
    planetMeshes.push(mesh);

    // Planet label
    const habScore = planet.cached_habitability || 0;
    const labelColor = habScore > 7000 ? '#44bb66' : habScore > 4000 ? '#888888' : '#555555';
    zoneGroup.add(makeLabel(
      planet.name,
      px, pz + planetVisualRadius(planet) + 10, labelColor
    ));

    // Render moons as small dots around the planet
    const moons = moonsByParent[planet.id] || [];
    if (moons.length > 0) {
      const pRadius = planetVisualRadius(planet);
      for (let mi = 0; mi < moons.length; mi++) {
        const moon = moons[mi];
        // Space moons evenly around the planet
        const moonAngle = (mi / moons.length) * Math.PI * 2;
        const moonDist = pRadius * 2.5 + mi * 3; // spread outward
        const mx = px + Math.cos(moonAngle) * moonDist;
        const mz = pz + Math.sin(moonAngle) * moonDist;

        // Moon orbit ring (thin, dim)
        const moonOrbit = makeCircle(moonDist, 0x333344, 0.15);
        moonOrbit.position.set(px, 0, pz);
        zoneGroup.add(moonOrbit);

        // Moon sphere (tiny)
        const moonMesh = makePlanetMesh(moon);
        moonMesh.position.set(mx, 0, mz);
        // Scale down moon meshes
        moonMesh.scale.setScalar(0.5);
        zoneGroup.add(moonMesh);
        planetMeshes.push(moonMesh);

        // Moon label (small, dim)
        zoneGroup.add(makeLabel(moon.name, mx, mz + 6, '#555555'));
      }
    }
  }
}

// ============================================================
// PLANET GLOBE RENDERER
// ============================================================
const planetGlobeGroup = new THREE.Group();
planetGlobeGroup.visible = false;
scene.add(planetGlobeGroup);

const BIOME_COLORS = {
  ocean:     0x1a4a7a, sea:       0x2a5a8a, forest:    0x2d5a27,
  grassland: 0x5a7a3a, desert:    0xc4a44a, tundra:    0x8a9a9a,
  ice_cap:   0xd4dde6, volcanic:  0x5a2a1a, barren:    0x6a6058,
  toxic:     0x4a5a2a, temperate: 0x4a8a4a, tropical:  0x2a7a3a,
  swamp:     0x3a5a3a, continent: 0x7a7060, plateau:   0x8a7a6a,
  island:    0x6a8a5a,
};

// Simple value-noise from 3D position for biome boundary variation
function valueNoise3D(x, y, z) {
  const n = Math.sin(x * 12.9898 + y * 78.233 + z * 45.164) * 43758.5453;
  return n - Math.floor(n);
}

function fbmNoise(x, y, z, octaves) {
  let v = 0, amp = 0.5, freq = 1;
  for (let i = 0; i < octaves; i++) {
    v += valueNoise3D(x * freq, y * freq, z * freq) * amp;
    amp *= 0.5; freq *= 2.1;
  }
  return v;
}

// Create an icosphere by subdividing an icosahedron
function createIcosphere(radius, subdivisions) {
  const t = (1 + Math.sqrt(5)) / 2;
  let verts = [
    [-1, t, 0], [1, t, 0], [-1, -t, 0], [1, -t, 0],
    [0, -1, t], [0, 1, t], [0, -1, -t], [0, 1, -t],
    [t, 0, -1], [t, 0, 1], [-t, 0, -1], [-t, 0, 1],
  ];
  let faces = [
    [0,11,5],[0,5,1],[0,1,7],[0,7,10],[0,10,11],
    [1,5,9],[5,11,4],[11,10,2],[10,7,6],[7,1,8],
    [3,9,4],[3,4,2],[3,2,6],[3,6,8],[3,8,9],
    [4,9,5],[2,4,11],[6,2,10],[8,6,7],[9,8,1],
  ];

  // Normalize initial vertices to unit sphere
  verts = verts.map(v => {
    const l = Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2]);
    return [v[0]/l, v[1]/l, v[2]/l];
  });

  const midPointCache = {};
  function getMidpoint(i1, i2) {
    const key = Math.min(i1,i2) + '_' + Math.max(i1,i2);
    if (midPointCache[key] !== undefined) return midPointCache[key];
    const v1 = verts[i1], v2 = verts[i2];
    const mid = [(v1[0]+v2[0])/2, (v1[1]+v2[1])/2, (v1[2]+v2[2])/2];
    const l = Math.sqrt(mid[0]*mid[0]+mid[1]*mid[1]+mid[2]*mid[2]);
    mid[0]/=l; mid[1]/=l; mid[2]/=l;
    verts.push(mid);
    midPointCache[key] = verts.length - 1;
    return verts.length - 1;
  }

  for (let s = 0; s < subdivisions; s++) {
    const newFaces = [];
    for (const [a, b, c] of faces) {
      const ab = getMidpoint(a, b);
      const bc = getMidpoint(b, c);
      const ca = getMidpoint(c, a);
      newFaces.push([a, ab, ca], [b, bc, ab], [c, ca, bc], [ab, bc, ca]);
    }
    faces = newFaces;
    // Clear cache between subdivision levels to avoid stale keys
  }

  // Scale to radius
  const positions = new Float32Array(faces.length * 9);
  const normals = new Float32Array(faces.length * 9);
  const faceCenters = []; // {x,y,z,lat} per face
  for (let f = 0; f < faces.length; f++) {
    const [a, b, c] = faces[f];
    let cx = 0, cy = 0, cz = 0;
    for (let vi = 0; vi < 3; vi++) {
      const v = verts[faces[f][vi]];
      positions[f*9+vi*3]   = v[0] * radius;
      positions[f*9+vi*3+1] = v[1] * radius;
      positions[f*9+vi*3+2] = v[2] * radius;
      normals[f*9+vi*3]   = v[0];
      normals[f*9+vi*3+1] = v[1];
      normals[f*9+vi*3+2] = v[2];
      cx += v[0]; cy += v[1]; cz += v[2];
    }
    cx /= 3; cy /= 3; cz /= 3;
    const lat = Math.asin(cy / Math.sqrt(cx*cx+cy*cy+cz*cz)); // -PI/2 to PI/2
    faceCenters.push({ x: cx, y: cy, z: cz, lat });
  }

  return { positions, normals, faceCenters, faceCount: faces.length };
}

// Assign faces to regions and color them
function buildGlobeGeometry(globeRadius, regions) {
  const { positions, normals, faceCenters, faceCount } = createIcosphere(globeRadius, 4);
  const colors = new Float32Array(faceCount * 9);

  // Sort regions: oceans first, then by area_fraction descending
  const sortedRegions = [...regions].sort((a, b) => {
    const aOcean = (a.type_name === 'ocean' || a.biome_name === 'ocean' || a.biome_name === 'sea') ? 0 : 1;
    const bOcean = (b.type_name === 'ocean' || b.biome_name === 'ocean' || b.biome_name === 'sea') ? 0 : 1;
    if (aOcean !== bOcean) return aOcean - bOcean;
    return (b.area_fraction || 0) - (a.area_fraction || 0);
  });

  // Latitude band mapping: integer bands (0=equatorial, 1=temperate, 2=subpolar, 3=polar, 4=extreme polar)
  // Maps to latitude degree ranges. Regions have symmetric north/south placement.
  const LAT_BANDS_INT = {
    0: [-20, 20],   // equatorial
    1: [-45, -15, 15, 45],  // temperate (two bands)
    2: [-65, -40, 40, 65],  // subpolar
    3: [-90, -60, 60, 90],  // polar
    4: [-90, -75, 75, 90],  // extreme polar
  };

  function getLatRange(band) {
    const b = LAT_BANDS_INT[band] || LAT_BANDS_INT[0];
    if (b.length === 2) return b; // equatorial: single band
    // For north/south bands, randomly pick hemisphere per region (handled by noise)
    return [b[0], b[3]]; // full span, noise will cluster faces
  }

  // Build region assignment: for each face, pick the best matching region
  // Each region owns a fraction of total area. We assign faces greedily.
  const regionAssign = new Array(faceCount).fill(-1);
  const regionBudget = sortedRegions.map(r => Math.max(1, Math.round((r.area_fraction / 10000) * faceCount)));

  // First pass: assign each face to the best matching region
  const faceScores = [];
  for (let f = 0; f < faceCount; f++) {
    const fc = faceCenters[f];
    const latDeg = (fc.lat / Math.PI) * 180;
    const noise = fbmNoise(fc.x * 3, fc.y * 3, fc.z * 3, 4) * 20 - 10; // +/- 10 degrees jitter
    const noisedLat = latDeg + noise;

    let bestRegion = -1, bestScore = -Infinity;
    for (let r = 0; r < sortedRegions.length; r++) {
      const reg = sortedRegions[r];
      const band = getLatRange(reg.latitude_band);
      const mid = (band[0] + band[1]) / 2;
      const halfSpan = (band[1] - band[0]) / 2;

      // How well does face latitude match the region's band?
      let latScore;
      if (noisedLat >= band[0] && noisedLat <= band[1]) {
        latScore = 1.0 - Math.abs(noisedLat - mid) / (halfSpan + 1);
      } else {
        const dist = Math.min(Math.abs(noisedLat - band[0]), Math.abs(noisedLat - band[1]));
        latScore = -dist * 0.05;
      }

      // Add noise based on face position for organic shapes
      const posNoise = fbmNoise(fc.x * 5 + r * 1.3, fc.y * 5 + r * 2.7, fc.z * 5 + r * 0.9, 3);
      const score = latScore + posNoise * 0.5 + (reg.area_fraction / 10000) * 0.3;

      if (score > bestScore) { bestScore = score; bestRegion = r; }
    }
    faceScores.push({ face: f, region: bestRegion, score: bestScore });
  }

  // Assign: respect budgets roughly
  const regionCounts = new Array(sortedRegions.length).fill(0);
  // Sort faces by score descending for their assigned region — give priority to strong matches
  faceScores.sort((a, b) => b.score - a.score);

  for (const fs of faceScores) {
    let r = fs.region;
    if (r >= 0 && regionCounts[r] < regionBudget[r] * 1.5) {
      regionAssign[fs.face] = r;
      regionCounts[r]++;
    } else {
      // Find an under-filled region that fits latitude
      const fc = faceCenters[fs.face];
      const latDeg = (fc.lat / Math.PI) * 180;
      let bestR = 0;
      for (let ri = 0; ri < sortedRegions.length; ri++) {
        if (regionCounts[ri] < regionBudget[ri]) { bestR = ri; break; }
      }
      regionAssign[fs.face] = bestR;
      regionCounts[bestR]++;
    }
  }

  // Elevation map: biome → height displacement factor
  const ELEV = {
    ocean: -0.03, sea: -0.02, forest: 0.01, grassland: 0.005,
    desert: 0.008, tundra: 0.01, ice_cap: 0.02, volcanic: 0.03,
    barren: 0.005, toxic: 0.0, temperate: 0.005, tropical: 0.003,
    swamp: -0.01, continent: 0.01, plateau: 0.025, island: 0.01,
  };

  // Color + displace each face based on its region's biome
  for (let f = 0; f < faceCount; f++) {
    const rIdx = regionAssign[f];
    const reg = sortedRegions[rIdx] || sortedRegions[0];
    const biomeName = reg.biome_name || reg.type_name || 'continent';
    const hexColor = BIOME_COLORS[biomeName] || BIOME_COLORS.continent;
    const col = new THREE.Color(hexColor);

    const fc = faceCenters[f];
    const variation = (fbmNoise(fc.x * 8, fc.y * 8, fc.z * 8, 2) - 0.5) * 0.12;

    // Terrain displacement
    const baseElev = ELEV[biomeName] || 0;
    const elevNoise = (fbmNoise(fc.x * 6, fc.y * 6, fc.z * 6, 3) - 0.5) * 0.015;
    const elev = baseElev + elevNoise + (reg.elevation_class || 0) * 0.005;

    // Ocean depth darkening
    if (baseElev < 0) {
      const depth = -baseElev + Math.abs(elevNoise);
      col.r *= (1 - depth * 3);
      col.g *= (1 - depth * 2);
      col.b *= (1 - depth * 0.5);
    }

    col.r = Math.max(0, Math.min(1, col.r + variation));
    col.g = Math.max(0, Math.min(1, col.g + variation * 0.8));
    col.b = Math.max(0, Math.min(1, col.b + variation * 0.6));

    // Apply displacement to vertex positions
    for (let v = 0; v < 3; v++) {
      const pi = f * 9 + v * 3;
      const nx = positions[pi] / globeRadius;
      const ny = positions[pi+1] / globeRadius;
      const nz = positions[pi+2] / globeRadius;
      const scale = 1 + elev;
      positions[pi]   = nx * globeRadius * scale;
      positions[pi+1] = ny * globeRadius * scale;
      positions[pi+2] = nz * globeRadius * scale;

      colors[f*9+v*3]   = col.r;
      colors[f*9+v*3+1] = col.g;
      colors[f*9+v*3+2] = col.b;
    }
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('normal', new THREE.BufferAttribute(normals, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  geo.computeVertexNormals(); // recompute normals after displacement
  return geo;
}

// Gas giant: banded sphere using vertex colors based on latitude + noise
function buildGasGiantGlobe(radius, planet) {
  const isIce = planet.class_name === 'ice_giant';
  const geo = new THREE.SphereGeometry(radius, 64, 48);
  const pos = geo.attributes.position;
  const colors = new Float32Array(pos.count * 3);

  // Band palette: gas giant = warm browns/tans, ice giant = cool blues/cyans
  const palette = isIce ? [
    [0.30, 0.55, 0.70], [0.25, 0.48, 0.65], [0.35, 0.60, 0.72],
    [0.22, 0.42, 0.58], [0.40, 0.65, 0.75], [0.28, 0.50, 0.68],
  ] : [
    [0.85, 0.70, 0.45], [0.75, 0.55, 0.30], [0.90, 0.75, 0.50],
    [0.65, 0.45, 0.25], [0.80, 0.65, 0.40], [0.70, 0.50, 0.28],
    [0.55, 0.35, 0.20], [0.88, 0.72, 0.48],
  ];

  for (let i = 0; i < pos.count; i++) {
    const y = pos.getY(i) / radius; // -1 to 1
    const x = pos.getX(i) / radius;
    const z = pos.getZ(i) / radius;

    // Latitude-based banding with noise for turbulence
    const lat = Math.asin(y);
    const bandFreq = isIce ? 6 : 12;
    const noise = fbmNoise(x * 4, y * 2, z * 4, 3) * 0.4;
    const bandVal = Math.sin(lat * bandFreq + noise * 5) * 0.5 + 0.5;

    // Pick color from palette
    const idx = Math.floor(bandVal * (palette.length - 1));
    const frac = bandVal * (palette.length - 1) - idx;
    const c0 = palette[idx];
    const c1 = palette[Math.min(idx + 1, palette.length - 1)];

    // Interpolate + add noise variation
    const v = fbmNoise(x * 8 + 10, y * 3, z * 8, 2) * 0.06 - 0.03;
    colors[i*3]   = Math.max(0, Math.min(1, c0[0] + (c1[0]-c0[0])*frac + v));
    colors[i*3+1] = Math.max(0, Math.min(1, c0[1] + (c1[1]-c0[1])*frac + v));
    colors[i*3+2] = Math.max(0, Math.min(1, c0[2] + (c1[2]-c0[2])*frac + v));
  }

  geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
  return new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ vertexColors: true }));
}

// Create feature markers on globe surface
function addFeatureMarkers(group, features, globeRadius) {
  for (const feat of features) {
    // Deterministic position on sphere from feature name hash
    let hash = 0;
    const name = feat.type_name + (feat.id || '') + (feat.scale || '');
    for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash + name.charCodeAt(i)) | 0;
    const phi = Math.acos(2 * ((hash & 0xffff) / 0xffff) - 1);
    const theta = ((hash >> 16 & 0xffff) / 0xffff) * Math.PI * 2;
    const px = globeRadius * Math.sin(phi) * Math.cos(theta);
    const py = globeRadius * Math.cos(phi);
    const pz = globeRadius * Math.sin(phi) * Math.sin(theta);

    const markerSize = 1.5 + (feat.scale || 50) / 80;
    let marker;

    switch (feat.type_name) {
      case 'volcano': {
        const geo = new THREE.ConeGeometry(markerSize * 0.6, markerSize * 1.5, 6);
        marker = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xcc3322 }));
        break;
      }
      case 'mountain_range': {
        const geo = new THREE.ConeGeometry(markerSize * 0.8, markerSize * 1.8, 4);
        marker = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x888888 }));
        break;
      }
      case 'mineral_vein':
      case 'rare_deposit': {
        const geo = new THREE.OctahedronGeometry(markerSize * 0.5);
        marker = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xddcc22 }));
        break;
      }
      case 'geothermal_vent': {
        const geo = new THREE.SphereGeometry(markerSize * 0.5, 8, 8);
        marker = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xee8833 }));
        break;
      }
      default: {
        const geo = new THREE.SphereGeometry(markerSize * 0.3, 6, 6);
        marker = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0xffffff }));
      }
    }

    // Position on surface and orient outward
    marker.position.set(px, py, pz);
    marker.lookAt(0, 0, 0);
    marker.rotateX(Math.PI / 2); // point cone/marker outward
    // Push slightly above surface
    const outward = new THREE.Vector3(px, py, pz).normalize().multiplyScalar(markerSize * 0.5);
    marker.position.add(outward);

    group.add(marker);
  }
}

// Settlement markers on globe — glowing beacons
function addSettlementMarkers(group, settlements, globeRadius) {
  for (let si = 0; si < settlements.length; si++) {
    const s = settlements[si];
    // Deterministic position from settlement name
    let hash = 0;
    for (let i = 0; i < s.name.length; i++) hash = ((hash << 5) - hash + s.name.charCodeAt(i)) | 0;
    const phi = Math.acos(2 * (((hash & 0xffff) ^ (si * 7919)) & 0xffff) / 0xffff - 1);
    const theta = (((hash >> 16) ^ (si * 6271)) & 0xffff) / 0xffff * Math.PI * 2;
    const px = globeRadius * Math.sin(phi) * Math.cos(theta);
    const py = globeRadius * Math.cos(phi);
    const pz = globeRadius * Math.sin(phi) * Math.sin(theta);

    const isCapital = s.is_capital;
    const beaconSize = isCapital ? 2.5 : 1.5;
    const beaconColor = isCapital ? 0xffcc44 : 0x44aaff;

    // Beacon core
    const core = new THREE.Mesh(
      new THREE.SphereGeometry(beaconSize, 8, 8),
      new THREE.MeshBasicMaterial({ color: beaconColor })
    );
    const outward = new THREE.Vector3(px, py, pz).normalize();
    core.position.set(px, py, pz).add(outward.clone().multiplyScalar(beaconSize));
    group.add(core);

    // Glow
    const glow = new THREE.Mesh(
      new THREE.SphereGeometry(beaconSize * 3, 8, 8),
      new THREE.MeshBasicMaterial({
        color: beaconColor, transparent: true, opacity: 0.15,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    glow.position.copy(core.position);
    group.add(glow);

    // Label
    const c = document.createElement('canvas');
    c.width = 256; c.height = 48;
    const ctx = c.getContext('2d');
    ctx.font = `bold ${isCapital ? 22 : 18}px Courier New`;
    ctx.fillStyle = isCapital ? '#ffcc44' : '#88bbdd';
    ctx.textAlign = 'center';
    ctx.fillText(s.name, 128, 32);
    const sprite = new THREE.Sprite(
      new THREE.SpriteMaterial({ map: new THREE.CanvasTexture(c), transparent: true, depthWrite: false, depthTest: false })
    );
    sprite.scale.set(80, 15, 1);
    sprite.position.copy(core.position).add(outward.clone().multiplyScalar(8));
    group.add(sprite);
  }
}

// Create atmosphere shell
function addAtmosphere(group, globeRadius, planet) {
  const ws = planet.water_state;
  const atCol = ws === 1 ? 0x4488cc : ws === 3 ? 0xcc8844 : 0x6688aa;
  const atOpacity = Math.min(0.15, (planet.atm_pressure || 0) / 20000);
  if (atOpacity > 0.01) {
    // Atmosphere glow
    group.add(new THREE.Mesh(
      new THREE.SphereGeometry(globeRadius * 1.04, 48, 48),
      new THREE.MeshBasicMaterial({
        color: atCol, transparent: true, opacity: atOpacity,
        side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    ));

    // Cloud layer — procedural vertex-colored sphere with patchy opacity
    if (planet.atm_pressure > 200 && planet.water_state > 0) {
      const cloudGeo = new THREE.SphereGeometry(globeRadius * 1.02, 48, 48);
      const cloudColors = new Float32Array(cloudGeo.attributes.position.count * 4);
      const pos = cloudGeo.attributes.position;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i) / globeRadius;
        const y = pos.getY(i) / globeRadius;
        const z = pos.getZ(i) / globeRadius;
        // Patchy clouds using noise
        const n = fbmNoise(x * 3, y * 2 + 0.5, z * 3, 4);
        const cloudPresence = n > 0.45 ? (n - 0.45) * 4 : 0; // threshold for cloud formation
        const alpha = Math.min(0.4, cloudPresence * 0.5);
        cloudColors[i*4] = 1; cloudColors[i*4+1] = 1; cloudColors[i*4+2] = 1;
        cloudColors[i*4+3] = alpha;
      }
      cloudGeo.setAttribute('color', new THREE.BufferAttribute(cloudColors, 4));
      const cloudMesh = new THREE.Mesh(cloudGeo, new THREE.MeshBasicMaterial({
        vertexColors: true, transparent: true, depthWrite: false, side: THREE.DoubleSide,
      }));
      cloudMesh.userData.isCloud = true;
      group.add(cloudMesh);
    }
  }
}

let globePlanetMesh = null; // the original small planet mesh, hidden while globe is shown

async function createPlanetGlobe(planet) {
  // Clear any existing globe
  while (planetGlobeGroup.children.length) planetGlobeGroup.remove(planetGlobeGroup.children[0]);

  const globeRadius = 50;

  // Find the planet's mesh in zoneGroup to get world position
  let worldPos = new THREE.Vector3();
  globePlanetMesh = null;
  for (const mesh of planetMeshes) {
    if (mesh.userData.planet && mesh.userData.planet.id === planet.id) {
      mesh.getWorldPosition(worldPos);
      globePlanetMesh = mesh;
      mesh.visible = false; // hide original small sphere
      break;
    }
  }

  planetGlobeGroup.position.copy(worldPos);

  // Fetch regions, features, and settlements
  const [regions, features, globeSettlements] = await Promise.all([
    fetch(`${PLANET_API}/planets/${planet.id}/regions`).then(r => r.json()).catch(() => []),
    fetch(`${PLANET_API}/planets/${planet.id}/features`).then(r => r.json()).catch(() => []),
    fetch(`${PLANET_API}/planets/${planet.id}/settlements`).then(r => r.json()).catch(() => []),
  ]);

  const isGasGiant = planet.class_name === 'gas_giant' || planet.class_name === 'ice_giant';

  if (isGasGiant) {
    // Gas/ice giants: banded sphere with no surface features
    const globeMesh = buildGasGiantGlobe(globeRadius, planet);
    planetGlobeGroup.add(globeMesh);

    // Thick atmosphere
    const atCol = planet.class_name === 'ice_giant' ? 0x4488bb : 0xcc9955;
    planetGlobeGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(globeRadius * 1.06, 48, 48),
      new THREE.MeshBasicMaterial({
        color: atCol, transparent: true, opacity: 0.08,
        side: THREE.DoubleSide, depthWrite: false, blending: THREE.AdditiveBlending,
      })
    ));
  } else if (regions.length > 0) {
    // Terrestrial: biome-colored icosphere
    const globeGeo = buildGlobeGeometry(globeRadius, regions);
    // Globe with rim lighting for atmospheric edge glow
    const globeMat = new THREE.ShaderMaterial({
      vertexColors: true, transparent: false,
      uniforms: { rimColor: { value: new THREE.Color(0x4488cc) }, rimPower: { value: 2.0 } },
      vertexShader: `
        varying vec3 vColor;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main() {
          vColor = color;
          vNormal = normalize(normalMatrix * normal);
          vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
          vViewDir = normalize(-mvPos.xyz);
          gl_Position = projectionMatrix * mvPos;
        }`,
      fragmentShader: `
        uniform vec3 rimColor;
        uniform float rimPower;
        varying vec3 vColor;
        varying vec3 vNormal;
        varying vec3 vViewDir;
        void main() {
          float rim = 1.0 - max(0.0, dot(vNormal, vViewDir));
          rim = pow(rim, rimPower) * 0.4;
          // Simple hemisphere lighting
          float light = 0.5 + 0.5 * dot(vNormal, normalize(vec3(0.5, 1.0, 0.3)));
          vec3 col = vColor * light + rimColor * rim;
          gl_FragColor = vec4(col, 1.0);
        }`,
    });
    planetGlobeGroup.add(new THREE.Mesh(globeGeo, globeMat));
    addAtmosphere(planetGlobeGroup, globeRadius, planet);
    if (features.length > 0) addFeatureMarkers(planetGlobeGroup, features, globeRadius);
    if (globeSettlements.length > 0) addSettlementMarkers(planetGlobeGroup, globeSettlements, globeRadius);
  } else {
    // Fallback: solid sphere
    planetGlobeGroup.add(new THREE.Mesh(
      new THREE.SphereGeometry(globeRadius, 48, 48),
      new THREE.MeshBasicMaterial({ color: planetColor(planet) })
    ));
    addAtmosphere(planetGlobeGroup, globeRadius, planet);
  }

  planetGlobeGroup.visible = true;

  // Fly camera to the globe
  const camDist = globeRadius * 3;
  flyTo(worldPos, camDist);
}

function destroyPlanetGlobe() {
  planetGlobeGroup.visible = false;
  while (planetGlobeGroup.children.length) {
    const child = planetGlobeGroup.children[0];
    if (child.geometry) child.geometry.dispose();
    if (child.material) {
      if (child.material.map) child.material.map.dispose();
      child.material.dispose();
    }
    planetGlobeGroup.remove(child);
  }
  // Restore original planet mesh visibility
  if (globePlanetMesh) {
    globePlanetMesh.visible = true;
    globePlanetMesh = null;
  }
}

const binaryCount = systems.filter(s => s._count > 1).length;

function updateHUD() {

      : '';

const visitedSystems = new Set();
const visitedOrder = []; // indices in order of exploration
const visitedInfo = {}; // idx → { planets, bestHab, bestName }

// Empire state
const empire = {
  claimedPlanets: [], // { id, name, sysIdx, systemName, hab, class_name }
  settlements: [],    // { name, planetName, region, pop }
  inventory: {},      // material_name → total mined
  totalMined: 0,
};
const discoveryLog = []; // { type, name, detail, score }

function trackDiscovery(planets, sysIdx) {
  if (visitedSystems.has(sysIdx)) return;
  visitedSystems.add(sysIdx);
  visitedOrder.push(sysIdx);
  discovery.explored++;

  const sys = systems[sysIdx];
  const mainPlanets = planets.filter(p => !p.id_parent);
  const moons = planets.filter(p => p.id_parent);

  discovery.planets += mainPlanets.length;
  discovery.moons += moons.length;

  // Log notable discoveries with notifications
  for (const p of mainPlanets) {
    const hab = p.cached_habitability || 0;
    if (hab > discovery.bestHab) {
      discovery.bestHab = hab;
      discovery.bestName = p.name;
    }
    // Habitable worlds
    if (hab > 7000) {
      discoveryLog.push({ type: 'habitable', name: p.name, detail: `${(hab/100).toFixed(0)}% hab in ${sys.name}`, score: hab, sysIdx, planetId: p.id });
      if (hab > 9000) showNotification('\ud83c\udf0d', `Paradise Found: ${p.name}`, `${(hab/100).toFixed(0)}% habitability — a rare gem`, '#44bb66');
      else showNotification('\ud83c\udf0d', `Habitable World: ${p.name}`, `${(hab/100).toFixed(0)}% habitability`, '#558844');
    }
    // Water worlds
    if (p.water_state === 1 && p.surface_water_frac > 3000) {
      discoveryLog.push({ type: 'ocean', name: p.name, detail: `${(p.surface_water_frac/100).toFixed(0)}% ocean in ${sys.name}`, score: p.surface_water_frac, sysIdx, planetId: p.id });
      showNotification('\ud83c\udf0a', `Ocean World: ${p.name}`, `${(p.surface_water_frac/100).toFixed(0)}% surface water`, '#4488aa');
    }
    // Gas giants
    if (p.class_name === 'gas_giant') {
      discoveryLog.push({ type: 'giant', name: p.name, detail: `${(p.total_mass/1000).toFixed(1)}M\u2295 in ${sys.name}`, score: p.total_mass, sysIdx, planetId: p.id });
    }
    // Extreme worlds
    if ((p.cached_surface_temp || 0) > 1000) {
      discoveryLog.push({ type: 'extreme', name: p.name, detail: `${p.cached_surface_temp}K inferno in ${sys.name}`, score: p.cached_surface_temp, sysIdx, planetId: p.id });
      showNotification('\ud83d\udd25', `Inferno: ${p.name}`, `${p.cached_surface_temp}K surface — molten hell`, '#cc4422');
    }
    // Frozen worlds
    if ((p.cached_surface_temp || 300) < 100 && p.total_mass > 500) {
      discoveryLog.push({ type: 'frozen', name: p.name, detail: `${p.cached_surface_temp}K frozen in ${sys.name}`, score: 10000 - (p.cached_surface_temp || 0), sysIdx, planetId: p.id });
    }
  }

  // Sort log by score descending
  discoveryLog.sort((a, b) => b.score - a.score);

  // Best habitability in this system
  const sysBestHab = Math.max(...mainPlanets.map(p => p.cached_habitability || 0), 0);
  const bestPlanet = mainPlanets.reduce((a, b) => ((a.cached_habitability||0) > (b.cached_habitability||0)) ? a : b, mainPlanets[0]);
  visitedInfo[sysIdx] = { planets: mainPlanets.length, moons: moons.length, bestHab: sysBestHab, bestName: bestPlanet?.name || '' };

  updateHUD();
  updateDiscoveryPanel();
  markVisited(sysIdx, sysBestHab);
}

  if (planetId && currentSystemData) {

const visitedMarkers = {}; // idx → mesh
const claimedMarkers = {}; // idx → mesh

function markClaimed(idx) {
  if (claimedMarkers[idx]) return;
  const s = systems[idx];
  const p = sysWorldPos(s);
  // Bright pulsing diamond shape for claimed systems
  const geo = new THREE.OctahedronGeometry(25);
  const mat = new THREE.MeshBasicMaterial({ color: 0x44bb66, transparent: true, opacity: 0.3, wireframe: true, depthWrite: false });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.position.copy(p);
  mesh.userData.claimed = true;
  scene.add(mesh);
  claimedMarkers[idx] = mesh;
}

function markVisited(idx, bestHab) {
  const s = systems[idx];
  const p = sysWorldPos(s);

  // Remove old marker if re-marking
  if (visitedMarkers[idx]) {
    scene.remove(visitedMarkers[idx]);
  }

  // Color by best habitability found in this system
  const hab = bestHab || 0;
  let color, opacity, size;
  if (hab > 7000) {
    color = 0x33cc55; opacity = 0.6; size = [18, 22]; // bright green — habitable!
  } else if (hab > 4000) {
    color = 0x557733; opacity = 0.4; size = [15, 18]; // muted — marginal
  } else {
    color = 0x333344; opacity = 0.3; size = [12, 15]; // dim — barren
  }

  const ring = new THREE.Mesh(
    new THREE.RingGeometry(size[0], size[1], 16),
    new THREE.MeshBasicMaterial({ color, side: THREE.DoubleSide, transparent: true, opacity, depthWrite: false })
  );
  ring.rotation.x = -Math.PI / 2;
  ring.position.copy(p);
  scene.add(ring);
  visitedMarkers[idx] = ring;
}

// -- Raycaster (adaptive threshold) --
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

function getHovered(e) {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  const camDist = camera.position.distanceTo(controls.target);
  raycaster.params.Points.threshold = Math.max(30, camDist * 0.012);
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObject(pointCloud);
  return hits.length > 0 ? hits[0].index : -1;
}

const tooltip = document.getElementById('tooltip');
renderer.domElement.addEventListener('pointermove', e => {
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Check planets first
  if (planetMeshes.length > 0) {
    const pHits = raycaster.intersectObjects(planetMeshes.map(m => m.children[0]));
    if (pHits.length > 0) {
      const pl = pHits[0].object.parent.userData.planet;
      if (pl) {
        tooltip.style.display = 'block';
        tooltip.style.left = (e.clientX + 14) + 'px';
        tooltip.style.top = (e.clientY + 14) + 'px';
        const hab = pl.cached_habitability || 0;
        tooltip.innerHTML = `<b>${pl.name}</b> (${pl.class_name})<br>${pl.cached_surface_temp||'?'}K | hab ${(hab/100).toFixed(0)}%`;
        renderer.domElement.style.cursor = 'pointer';
        return;
      }
    }
  }

  // Then check star systems
  const idx = getHovered(e);
  if (idx >= 0) {
    const s = systems[idx];
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY + 14) + 'px';
    const explored = visitedSystems.has(idx);
    let explLine = '';
    if (explored && visitedInfo[idx]) {
      const vi = visitedInfo[idx];
      const habPct = (vi.bestHab / 100).toFixed(0);
      const habCol = vi.bestHab > 7000 ? '#4b4' : vi.bestHab > 4000 ? '#aa8' : '#888';
      explLine = `<br><span style="color:#4a7">${vi.planets} planets</span> | best: <span style="color:${habCol}">${vi.bestName} ${habPct}%</span>`;
    } else {
      explLine = `<br><span style="color:#666">unexplored</span>`;
    }
    tooltip.innerHTML = `<b>${s.name}</b> ${s._count > 1 ? '<span style="color:#668">binary</span>' : ''}<br>dist ${s.dist}${explLine}`;
    renderer.domElement.style.cursor = 'pointer';
  } else {
    tooltip.style.display = 'none';
    renderer.domElement.style.cursor = 'default';
  }
});

// -- Navigate to a system (shared by click + WASD) --
let selectedIdx = -1;
let navigating = false;

let currentSystemData = null; // stash for back-navigation from planet view

async function navigateToSystem(idx) {
  if (navigating || idx < 0 || idx >= systems.length) return;
  navigating = true;
  selectedIdx = idx;
  destroyPlanetGlobe();
  const sys = systems[idx];
  const targetPos = sysWorldPos(sys);

  const [starsData, envData, planetsData] = await Promise.all([
    fetch(`${API}/systems/${sys.id}/stars`).then(r => r.json()),
    fetch(`${API}/systems/${sys.id}/environment`).then(r => r.json()).catch(() => null),
    fetch(`${PLANET_API}/systems/${sys.id}/planets`).then(r => r.json()).catch(() => []),
  ]);

  // Auto-generate planets if none exist
  let planets = planetsData;
  if (!planets || planets.length === 0) {
    document.getElementById('hud').textContent = `Generating planets for ${sys.name}...`;
    await fetch(`${PLANET_API}/generate/system/${sys.id}`, { method: 'POST' }).catch(() => null);
    planets = await fetch(`${PLANET_API}/systems/${sys.id}/planets`).then(r => r.json()).catch(() => []);
    updateHUD();
  }

  currentSystemData = { sys, starsData, envData, planets };

  const primary = starsData.find(s => s.is_primary) || starsData[0];
  let maxAU = (primary?.frost_line || 3000) / 1000;
  for (const s of starsData) {
    if (s.semi_major_axis) maxAU = Math.max(maxAU, s.semi_major_axis / 1000);
  }
  // Include outermost planet orbit
  for (const p of planets) {
    if (!p.id_parent) maxAU = Math.max(maxAU, p.semi_major_axis / 1000);
  }
  const zoomDist = Math.max(200, maxAU * ZONE_SCALE * 2.5);

  // Determine primary star offset for binary systems
  const companion = starsData.find(s => !s.is_primary);
  const primaryOffsetAU = companion ? -(primary?.semi_major_axis || 0) / 1000 : 0;

  showZones(targetPos, starsData);
  addPlanetsToZones(planets, primaryOffsetAU);
  showLaneHighlights(idx);

  // Tint scene by star color
  const [sr, sg, sb] = tempToRGB(primary?.temp || 5778);
  renderer.setClearColor(new THREE.Color(sr * 0.02, sg * 0.02, sb * 0.02));

  flyTo(targetPos, zoomDist);
  showSystemPanel(sys, starsData, envData, planets);
  trackDiscovery(planets, idx);
  navigating = false;
}

// Find nearest system in a direction relative to camera view
function findNeighbor(fromIdx, direction) {
  // direction: 'forward' | 'back' | 'left' | 'right'
  const from = sysWorldPos(systems[fromIdx]);

  // Camera's forward/right projected onto XZ plane
  const camForward = new THREE.Vector3();
  camera.getWorldDirection(camForward);
  camForward.y = 0; camForward.normalize();
  const camRight = new THREE.Vector3().crossVectors(camForward, new THREE.Vector3(0, 1, 0)).normalize();

  let dirVec;
  if (direction === 'forward')  dirVec = camForward;
  else if (direction === 'back') dirVec = camForward.clone().negate();
  else if (direction === 'left') dirVec = camRight.clone().negate();
  else dirVec = camRight;

  let bestIdx = -1, bestScore = -Infinity;

  for (let i = 0; i < systems.length; i++) {
    if (i === fromIdx) continue;
    const p = sysWorldPos(systems[i]);
    const delta = p.clone().sub(from);
    const dist = delta.length();
    if (dist < 1) continue;

    // Dot product with direction — how much is this star "in front" in the desired direction
    delta.normalize();
    const dot = delta.dot(dirVec);

    // Only consider stars roughly in the right half-space (dot > 0.3)
    if (dot < 0.3) continue;

    // Score: prefer close + aligned. Weighted: alignment matters more than distance.
    const score = dot * 2.0 - dist / 5000;
    if (score > bestScore) {
      bestScore = score;
      bestIdx = i;
    }
  }
  return bestIdx;
}

renderer.domElement.addEventListener('click', async e => {
  // First check if we clicked a planet mesh
  mouse.x = (e.clientX / innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  if (planetMeshes.length > 0) {
    const planetHits = raycaster.intersectObjects(planetMeshes.map(m => m.children[0]));
    if (planetHits.length > 0) {
      const planet = planetHits[0].object.parent.userData.planet;
      if (planet) {
        await showPlanetPanel(planet);
        return;
      }
    }
  }

  // Otherwise, check star point cloud
  const idx = getHovered(e);
  if (idx >= 0) navigateToSystem(idx);
});

// -- Info panels --
const fmt = (v, u, d=1) => `${(v/d).toFixed(d>1?3:0)} ${u}`;
const btn = (label, onclick) => `<button onclick="${onclick}" style="background:#1a1a2e;color:#6688aa;border:1px solid #333;padding:4px 10px;border-radius:4px;cursor:pointer;font-family:inherit;font-size:12px">${label}</button>`;

function showSystemPanel(sys, stars, env, planets) {
  const p = document.getElementById('panel');
  let h = `<span class="close" onclick="flyOut()">&times;</span>`;
  h += `<div style="margin-bottom:8px">${btn('&#8592; Galaxy', 'flyOut()')}</div>`;
  h += `<h2>${sys.name}</h2>`;
  h += `<div class="row"><span class="label">Position</span><span class="val">(${sys.pos_x}, ${sys.pos_y}, ${sys.pos_z})</span></div>`;
  h += `<div class="row"><span class="label">Distance</span><span class="val">${sys.dist} units</span></div>`;
  h += `<div class="row"><span class="label">Stars</span><span class="val">${stars.length}${stars.length > 1 ? ' (binary)' : ''}</span></div>`;
  h += `<div class="row"><span class="label">Planets</span><span class="val">${planets.length}</span></div>`;

  if (env) {
    h += `<h3>Stellar Environment</h3>`;
    h += `<div class="row"><span class="label">Spectral</span><span class="val">${env.spectral_name} ${env.lifecycle_name}</span></div>`;
    h += `<div class="row"><span class="label">Metallicity</span><span class="val">${fmt(env.metallicity,'dex',1000)}</span></div>`;
  }

  // Planet list — clickable
  if (planets.length > 0) {
    h += `<h3>Planets</h3>`;
    for (const planet of planets) {
      if (planet.id_parent) continue; // skip moons in main list
      const col = rgbHex([planetColor(planet).r, planetColor(planet).g, planetColor(planet).b]);
      const hab = planet.cached_habitability || 0;
      const habBar = `<span style="display:inline-block;width:${hab/100}px;height:6px;background:${hab>7000?'#44bb66':hab>4000?'#888':'#444'};border-radius:3px;vertical-align:middle;margin-left:4px"></span>`;
      const moons = planets.filter(m => m.id_parent === planet.id);
      const moonTag = moons.length > 0 ? ` <span style="color:#556">${moons.length} moon${moons.length>1?'s':''}</span>` : '';
      const ws = {0:'',1:' \ud83d\udca7',2:' \u2744\ufe0f',3:''}[planet.water_state] || '';
      h += `<div class="star-block" style="border-left:3px solid ${col};cursor:pointer" onclick="clickPlanet(${planet.id})">`;
      h += `<b>${planet.name}</b> <span style="color:#888">${planet.class_name}</span>${moonTag}`;
      h += `<div class="row"><span class="label">${fmt(planet.semi_major_axis,'AU',1000)} | ${planet.cached_surface_temp||'?'}K${ws}</span><span class="val">${habBar} ${(hab/100).toFixed(0)}%</span></div>`;
      h += `</div>`;
    }
  }

  p.innerHTML = h;
  p.style.display = 'block';
}

window.claimPlanet = async function(planetId) {
  const res = await fetch(`${PLANET_API}/planets/${planetId}/claim`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({owner_id: 1})
  }).then(r => r.json()).catch(() => null);
  if (res?.status === 'claimed') {
    showNotification('\ud83c\udff4', 'Planet Claimed!', 'This world is now yours', '#44bb66');
    const planet = currentSystemData?.planets?.find(p => p.id === planetId);
    if (planet) {
      planet.id_owner = { Valid: true, Int64: 1 };
      empire.claimedPlanets.push({
        id: planet.id, name: planet.name, sysIdx: selectedIdx,
        systemName: systems[selectedIdx]?.name || '?',
        hab: planet.cached_habitability || 0, class_name: planet.class_name,
      });
      // Mark system as claimed in galaxy view
      markClaimed(selectedIdx);
      await showPlanetPanel(planet);
    }
  }
};

window.foundSettlement = async function(planetId, regionId, regionName) {
  const name = prompt(`Name your settlement in ${regionName}:`, `New ${regionName.split(' ')[0]}`);
  if (!name) return;
  const res = await fetch(`${PLANET_API}/planets/${planetId}/settle`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({region_id: regionId, name})
  }).then(r => r.json()).catch(() => null);
  if (res?.id) {
    const planet = currentSystemData?.planets?.find(p => p.id === planetId);
    empire.settlements.push({ name, planetName: planet?.name || '?', region: regionName, pop: 25 });
    showNotification('\u26fa', `Settlement Founded: ${name}`, `Population: 25 in ${regionName}`, '#4488aa');
    if (planet) await showPlanetPanel(planet);
  }
};

window.mineDeposit = async function(depositId, planetId, materialName) {
  const res = await fetch(`${PLANET_API}/deposits/${depositId}/mine`, {
    method: 'POST', headers: {'Content-Type':'application/json'},
    body: JSON.stringify({amount: 100})
  }).then(r => r.json()).catch(e => ({error: 'failed'}));
  if (res?.error) {
    showNotification('\u26a0\ufe0f', 'Mining Failed', res.error, '#cc4422');
  } else {
    const remaining = res.abundance - res.depleted;
    const matName = materialName || 'resource';
    empire.inventory[matName] = (empire.inventory[matName] || 0) + 100;
    empire.totalMined += 100;
    showNotification('\u26cf\ufe0f', `Mined ${matName}`, `+100 units (${remaining} remaining)`, '#aa8833');
    const planet = currentSystemData?.planets?.find(p => p.id === planetId);
    if (planet) await showPlanetPanel(planet);
  }
};

window.clickPlanet = async function(id) {
  // Find the planet in currentSystemData
  const planet = currentSystemData?.planets?.find(p => p.id === id);
  if (planet) await showPlanetPanel(planet);
};

// Earth-relative formatting: "2.5× \u2191" with color
function earthRel(val, earthVal, unit, opts = {}) {
  const ratio = val / earthVal;
  const arrow = ratio > 1.1 ? '\u2191' : ratio < 0.9 ? '\u2193' : '\u2248';
  const color = opts.invGood
    ? (ratio > 1.5 ? '#c44' : ratio < 0.5 ? '#c44' : ratio > 0.9 && ratio < 1.1 ? '#4a4' : '#aa8')
    : (arrow === '\u2248' ? '#4a4' : '#aa8');
  return `${ratio.toFixed(2)}× ${unit} <span style="color:${color}">${arrow}</span>`;
}

function tempC(kelvin) {
  const c = kelvin - 273;
  const col = c >= 0 && c <= 40 ? '#4a4' : c > 40 && c < 100 ? '#aa8' : '#c44';
  return `${kelvin}K <span style="color:${col}">(${c > 0 ? '+' : ''}${c}\u00b0C)</span>`;
}

  h += `<div class="row"><span class="label">Mass</span><span class="val">${earthRel(planet.total_mass, 1000, 'Earth')}</span></div>`;
  h += `<div class="row"><span class="label">Radius</span><span class="val">${earthRel(planet.cached_radius||1000, 1000, 'Earth')}</span></div>`;
  h += `<div class="row"><span class="label">Gravity</span><span class="val">${earthRel(planet.cached_gravity||1000, 1000, 'g', {invGood:true})}</span></div>`;
  h += `<div class="row"><span class="label">Density</span><span class="val">${earthRel(planet.cached_density||5500, 5500, 'Earth')}</span></div>`;

  h += `<div class="row"><span class="label">Temperature</span><span class="val">${tempC(planet.cached_surface_temp||0)}</span></div>`;
  h += `<div class="row"><span class="label">Pressure</span><span class="val">${earthRel(planet.atm_pressure, 1013, 'atm', {invGood:true})}</span></div>`;
  h += `<div class="row"><span class="label">Water</span><span class="val">${ws} (${(planet.surface_water_frac/100).toFixed(0)}%)</span></div>`;
  h += `<div class="row"><span class="label">Mag. field</span><span class="val">${earthRel(planet.magnetic_field, 1000, 'Earth')}</span></div>`;

      const pct = (a.concentration / 100).toFixed(1);
      const displayName = atmNames[a.material_name] || a.material_name;
      h += `<div class="row"><span class="label">${displayName}</span><span class="val">`;

      h += `${pct}%</span></div>`;
    }

    h += `<h3>Geography (${regions.length} regions)</h3>`;
    const biomeCols = {
      ocean:'#1a4a7a', sea:'#2a5a8a', forest:'#2d5a27', grassland:'#5a7a3a',
      desert:'#c4a44a', tundra:'#8a9a9a', ice_cap:'#d4dde6', volcanic:'#5a2a1a',
      barren:'#6a6058', toxic:'#4a5a2a', temperate:'#4a8a4a', tropical:'#2a7a3a',
      swamp:'#3a5a3a',
    };
    const isLandType = n => !['ocean','sea'].includes(n);
    for (const r of regions.slice(0, 8)) {
      const bc = biomeCols[r.biome_name] || '#666';
      const canSettle = isLandType(r.biome_name) && owned;

      h += `<span class="val" style="font-size:11px;color:#888">${r.biome_name} ${(r.area_fraction/100).toFixed(0)}%</span>`;

      h += `<span style="margin-right:5px">${icon}</span>`;

      h += `<span class="val" style="color:#777">${f.type_name.replace('_',' ')}</span>`;
      h += `</div>`;
    }
    if (features.length > 10) h += `<div style="color:#555;font-size:11px">+${features.length - 10} more</div>`;
  }

  // Deposits
  if (deposits.length > 0) {
    h += `<h3>Resources (${deposits.length} deposits)</h3>`;

    const byMat = {};
    for (const d of deposits) {
      const name = d.material_name;

      byMat[name].total += remaining;
      byMat[name].count++;
      if (remaining > byMat[name].bestRemain) {
        byMat[name].bestId = d.id;
        byMat[name].bestRemain = remaining;
      }

    const sorted = Object.entries(byMat).sort((a, b) => b[1].total - a[1].total);
    for (const [name, data] of sorted.slice(0, 10)) {

  // Settlements
  const settlements = await fetch(`${PLANET_API}/planets/${id}/settlements`).then(r => r.json()).catch(() => []);
  if (settlements.length > 0) {
    const totalPop = settlements.reduce((sum, s) => sum + s.population, 0);
    h += `<h3>Settlements (pop ${totalPop.toLocaleString()})</h3>`;
    const typeIcons = { colony: '\ud83c\udfe0', outpost: '\u26fa', mining_camp: '\u26cf\ufe0f', research_station: '\ud83d\udd2c' };
    for (const s of settlements) {
