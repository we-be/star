      h += `</span>`;
      h += `<span class="val" style="color:#888">${s.population.toLocaleString()} pop</span>`;
      h += `</div>`;
    }
  }

  // Moons
  const moons = await fetch(`${PLANET_API}/planets/${id}/moons`).then(r => r.json()).catch(() => []);
  if (moons.length > 0) {
    h += `<h3>Moons (${moons.length})</h3>`;
    for (const moon of moons) {
      const mcol = rgbHex([planetColor(moon).r, planetColor(moon).g, planetColor(moon).b]);
      const mhab = moon.cached_habitability || 0;
      h += `<div class="star-block" style="border-left:3px solid ${mcol};cursor:pointer" onclick="clickPlanet(${moon.id})">`;
      h += `<b>${moon.name}</b> <span style="color:#888">${moon.class_name}</span>`;
      h += `<div class="row"><span class="label">${moon.cached_surface_temp||'?'}K | ${fmt(moon.total_mass,'M\u2295',1000)}</span><span class="val">${(mhab/100).toFixed(0)}% hab</span></div>`;
      h += `</div>`;
    }
  }

  p.innerHTML = h;
  p.style.display = 'block';
  makeCollapsible();

  // Create and fly to the 3D globe
  await createPlanetGlobe(planet);
}

// Make panel sections collapsible after rendering
function makeCollapsible() {
  document.querySelectorAll('#panel h3').forEach(h3 => {
    if (h3.dataset.bound) return;
    h3.dataset.bound = '1';
    h3.addEventListener('click', () => {
      h3.classList.toggle('collapsed');
      // Toggle the next siblings until next h3 or end
      let el = h3.nextElementSibling;
      while (el && el.tagName !== 'H3') {
        el.classList.toggle('collapsed');
        el = el.nextElementSibling;
      }
    });
  });
}

window.backToSystem = function() {
  // Destroy the globe before restoring system view
  destroyPlanetGlobe();
  if (currentSystemData) {
    const { sys, starsData, envData, planets } = currentSystemData;
    showSystemPanel(sys, starsData, envData, planets);
    // Fly back to system overview
    const targetPos = sysWorldPos(sys);
    const primary = starsData.find(s => s.is_primary) || starsData[0];
    let maxAU = (primary?.frost_line || 3000) / 1000;
    for (const s of starsData) {
      if (s.semi_major_axis) maxAU = Math.max(maxAU, s.semi_major_axis / 1000);
    }
    for (const p of planets) {
      if (!p.id_parent) maxAU = Math.max(maxAU, p.semi_major_axis / 1000);
    }
    const zoomDist = Math.max(200, maxAU * ZONE_SCALE * 2.5);
    flyTo(targetPos, zoomDist);
  }
};

// -- Fly-to camera --
let flyAnim = null;

function flyTo(target, distance = 800) {
  if (flyAnim) { cancelAnimationFrame(flyAnim); flyAnim = null; }
  const startPos = camera.position.clone();
  const startTarget = controls.target.clone();
  const dir = new THREE.Vector3().subVectors(startPos, target).normalize();
  const endPos = target.clone().addScaledVector(dir, distance);
  const endTarget = target.clone();
  const t0 = performance.now();

  (function tick(now) {
    const t = Math.min(1, (now - t0) / 1200);
    const e = 1 - Math.pow(1 - t, 3);
    camera.position.lerpVectors(startPos, endPos, e);
    controls.target.lerpVectors(startTarget, endTarget, e);
    controls.update();
    if (t < 1) flyAnim = requestAnimationFrame(tick);
    else flyAnim = null;
  })(t0);
}

function flyOut() {
  destroyPlanetGlobe();
  hideZones();
  hideLaneHighlights();
  selectedIdx = -1;
  renderer.setClearColor(0x000000);
  flyTo(new THREE.Vector3(0, 0, 0), 14000);
  document.getElementById('panel').style.display = 'none';
}
window.flyOut = flyOut;

// -- Search --
let searchOpen = false;

function openSearch() {
  searchOpen = true;
  const box = document.getElementById('search-box');
  const input = document.getElementById('search-input');
  const results = document.getElementById('search-results');
  box.style.display = 'block';
  input.value = '';
  results.style.display = 'none';
  input.focus();

  input.oninput = () => {
    const q = input.value.toLowerCase().trim();
    if (q.length < 2) { results.style.display = 'none'; return; }

    const matches = [];
    for (let i = 0; i < systems.length; i++) {
      if (systems[i].name.toLowerCase().includes(q)) {
        matches.push(i);
        if (matches.length >= 10) break;
      }
    }

    if (matches.length === 0) {
      results.innerHTML = '<div style="padding:8px;color:#666;font-size:12px">No matches</div>';
    } else {
      results.innerHTML = matches.map(i => {
        const s = systems[i];
        const visited = visitedSystems.has(i);
        const tag = visited ? `<span style="color:#4a7;font-size:10px">explored</span>` : '';
        return `<div style="padding:6px 12px;cursor:pointer;font-size:13px;border-bottom:1px solid #222" onmousedown="searchNav(${i})">
          <b style="color:#ddd">${s.name}</b> ${tag}
          <span style="color:#666;float:right">dist ${s.dist}</span>
        </div>`;
      }).join('');
    }
    results.style.display = 'block';
  };

  input.onkeydown = (ev) => {
    if (ev.key === 'Escape') { closeSearch(); return; }
    if (ev.key === 'Enter') {
      const q = input.value.toLowerCase().trim();
      for (let i = 0; i < systems.length; i++) {
        if (systems[i].name.toLowerCase().includes(q)) {
          closeSearch();
          navigateToSystem(i);
          return;
        }
      }
    }
  };
}

function closeSearch() {
  searchOpen = false;
  document.getElementById('search-box').style.display = 'none';
  document.getElementById('search-results').style.display = 'none';
}

window.searchNav = function(idx) {
  closeSearch();
  navigateToSystem(idx);
};

// -- Spectral type filter --
let activeFilter = null;

function toggleSpectralFilter(letter) {
  if (activeFilter === letter) {
    clearSpectralFilter();
    return;
  }
  activeFilter = letter;
  const colorAttr = pointsGeo.attributes.color;
  const sizeAttr = pointsGeo.attributes.size;
  for (let i = 0; i < count; i++) {
    const sysName = systems[i].name || '';
    // Check if this system's primary star matches the spectral type
    // We stored the primary temp — infer type from temperature range
    const temp = systems[i]._temp;
    const type = tempToSpectral(temp);
    const match = type === letter;
    if (match) {
      const [r, g, b] = tempToRGB(temp);
      colorAttr.array[i*3] = r; colorAttr.array[i*3+1] = g; colorAttr.array[i*3+2] = b;
      sizeAttr.array[i] = (4 + Math.log10(Math.max(1, systems[i]._lum)) * 3) * 1.5;
    } else {
      colorAttr.array[i*3] = 0.08; colorAttr.array[i*3+1] = 0.08; colorAttr.array[i*3+2] = 0.1;
      sizeAttr.array[i] = 2;
    }
  }
  colorAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;
  document.getElementById('hud').textContent = `Showing ${letter}-type stars (press 0 to clear)`;
}

function clearSpectralFilter() {
  activeFilter = null;
  const colorAttr = pointsGeo.attributes.color;
  const sizeAttr = pointsGeo.attributes.size;
  for (let i = 0; i < count; i++) {
    const [r, g, b] = tempToRGB(systems[i]._temp);
    colorAttr.array[i*3] = r; colorAttr.array[i*3+1] = g; colorAttr.array[i*3+2] = b;
    sizeAttr.array[i] = 4 + Math.log10(Math.max(1, systems[i]._lum)) * 3;
  }
  colorAttr.needsUpdate = true;
  sizeAttr.needsUpdate = true;
  updateHUD();
}

function tempToSpectral(temp) {
  if (temp > 30000) return 'O';
  if (temp > 10000) return 'B';
  if (temp > 7500) return 'A';
  if (temp > 6000) return 'F';
  if (temp > 5200) return 'G';
  if (temp > 3700) return 'K';
  return 'M';
}

// -- WASD star navigation --
const wasdCooldown = {};
addEventListener('keydown', e => {
  const k = e.key.toLowerCase();

  if (k === 'escape') {
    if (searchOpen) { closeSearch(); return; }
    // If viewing a planet globe, go back to system first
    if (planetGlobeGroup.visible) { backToSystem(); return; }
    flyOut();
    return;
  }

  // /: open search
  if (k === '/' && !searchOpen) {
    e.preventDefault();
    openSearch();
    return;
  }

  // E: empire overview
  if (k === 'e') {
    showEmpirePanel();
    return;
  }

  // G: galaxy overview stats
  if (k === 'g' && selectedIdx < 0) {
    showGalaxyStats();
    return;
  }

  // L: toggle discovery log
  if (k === 'l') {
    const disc = document.getElementById('discoveries');
    disc.style.display = disc.style.display === 'none' ? 'block' : 'none';
    return;
  }

  // Number keys 1-7: filter galaxy by spectral type
  if (k >= '1' && k <= '7' && selectedIdx < 0) {
    const typeMap = { '1': 'O', '2': 'B', '3': 'A', '4': 'F', '5': 'G', '6': 'K', '7': 'M' };
    const letter = typeMap[k];
    toggleSpectralFilter(letter);
    return;
  }

  // 0: clear spectral filter
  if (k === '0' && selectedIdx < 0) {
    clearSpectralFilter();
    return;
  }

  // R: jump to random unexplored system
  if (k === 'r' && !navigating) {
    const unexplored = [];
    for (let i = 0; i < systems.length; i++) {
      if (!visitedSystems.has(i)) unexplored.push(i);
    }
    if (unexplored.length > 0) {
      const pick = unexplored[Math.floor(Math.random() * unexplored.length)];
      navigateToSystem(pick);
    }
    return;
  }

  // Tab: cycle through planets in current system
  if (e.key === 'Tab' && currentSystemData && currentSystemData.planets.length > 0) {
    e.preventDefault();
    const planets = currentSystemData.planets.filter(p => !p.id_parent);
    if (planets.length === 0) return;
    // Find current planet index or start at 0
    const curId = planetGlobeGroup.visible ? (planetGlobeGroup.userData?.planetId || 0) : 0;
    const curIdx = planets.findIndex(p => p.id === curId);
    const nextIdx = (curIdx + 1) % planets.length;
    const next = planets[nextIdx];
    planetGlobeGroup.userData = { planetId: next.id };
    showPlanetPanel(next);
    return;
  }

  // WASD: hop to neighboring star
  if (['w','a','s','d'].includes(k) && selectedIdx >= 0 && !navigating) {
    // Debounce: one hop per keypress
    if (wasdCooldown[k]) return;
    wasdCooldown[k] = true;

    const dir = { w: 'forward', s: 'back', a: 'left', d: 'right' }[k];
    const neighbor = findNeighbor(selectedIdx, dir);
    if (neighbor >= 0) navigateToSystem(neighbor);
  }

  // If no star selected, WASD picks the nearest star to camera target
  if (['w','a','s','d'].includes(k) && selectedIdx < 0 && !navigating) {
    if (wasdCooldown[k]) return;
    wasdCooldown[k] = true;
    // Find nearest system to where camera is looking
    const target = controls.target.clone();
    let bestIdx = 0, bestDist = Infinity;
    for (let i = 0; i < systems.length; i++) {
      const d = sysWorldPos(systems[i]).distanceTo(target);
      if (d < bestDist) { bestDist = d; bestIdx = i; }
    }
    navigateToSystem(bestIdx);
  }
});

addEventListener('keyup', e => { wasdCooldown[e.key.toLowerCase()] = false; });

// -- Resize --
addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// -- Minimap --
const minimapCanvas = document.createElement('canvas');
minimapCanvas.width = 160; minimapCanvas.height = 160;
minimapCanvas.style.cssText = 'position:absolute;bottom:50px;left:16px;border:1px solid #333;border-radius:4px;opacity:0.6;pointer-events:none;display:none';
document.body.appendChild(minimapCanvas);
const mctx = minimapCanvas.getContext('2d');

function drawMinimap() {
  if (selectedIdx < 0) { minimapCanvas.style.display = 'none'; return; }
  minimapCanvas.style.display = 'block';
  const w = minimapCanvas.width, h = minimapCanvas.height;
  mctx.fillStyle = '#080810';
  mctx.fillRect(0, 0, w, h);

  // Galaxy bounds: -10000 to 10000 in pos_x/pos_y
  const scale = w / 22000;
  const ox = w / 2, oy = h / 2;

  // Draw all systems as tiny dots, colored by discovery status
  for (let i = 0; i < systems.length; i++) {
    const s = systems[i];
    const sx = ox + s.pos_x * scale;
    const sy = oy + s.pos_y * scale;
    if (visitedSystems.has(i)) {
      const vi = visitedInfo[i];
      const hab = vi?.bestHab || 0;
      if (hab > 7000) mctx.fillStyle = '#4c4';
      else if (hab > 4000) mctx.fillStyle = '#585';
      else mctx.fillStyle = '#445';
      mctx.fillRect(sx - 0.5, sy - 0.5, 2, 2);
    } else {
      mctx.fillStyle = '#1a1a22';
      mctx.fillRect(sx, sy, 1, 1);
    }
  }

  // Draw lanes for selected system
  const sel = systems[selectedIdx];
  for (const ni of laneConnections[selectedIdx]) {
    const n = systems[ni];
    mctx.strokeStyle = '#335';
    mctx.lineWidth = 0.5;
    mctx.beginPath();
    mctx.moveTo(ox + sel.pos_x * scale, oy + sel.pos_y * scale);
    mctx.lineTo(ox + n.pos_x * scale, oy + n.pos_y * scale);
    mctx.stroke();
  }

  // Draw exploration trail
  if (visitedOrder.length > 1) {
    mctx.strokeStyle = '#2a3a4a';
    mctx.lineWidth = 0.8;
    mctx.beginPath();
    const first = systems[visitedOrder[0]];
    mctx.moveTo(ox + first.pos_x * scale, oy + first.pos_y * scale);
    for (let i = 1; i < visitedOrder.length; i++) {
      const s = systems[visitedOrder[i]];
      mctx.lineTo(ox + s.pos_x * scale, oy + s.pos_y * scale);
    }
    mctx.stroke();
  }

  // Draw claimed systems as bright green diamonds
  for (const cp of empire.claimedPlanets) {
    const s = systems[cp.sysIdx];
    if (!s) continue;
    const sx = ox + s.pos_x * scale;
    const sy = oy + s.pos_y * scale;
    mctx.fillStyle = '#4c4';
    mctx.save();
    mctx.translate(sx, sy);
    mctx.rotate(Math.PI / 4);
    mctx.fillRect(-2.5, -2.5, 5, 5);
    mctx.restore();
  }

  // Draw current position as bright dot
  mctx.fillStyle = '#4af';
  mctx.beginPath();
  mctx.arc(ox + sel.pos_x * scale, oy + sel.pos_y * scale, 3, 0, Math.PI * 2);
  mctx.fill();
}

// -- Render loop --
let lastCamAngle = 0;
let frameCount = 0;
(function animate(time) {
  requestAnimationFrame(animate);
  controls.update();
  frameCount++;

  // Auto-rotate the planet globe + cloud parallax
  if (planetGlobeGroup.visible && planetGlobeGroup.children.length > 0) {
    planetGlobeGroup.rotation.y += 0.002;
    // Clouds rotate slightly faster for parallax
    for (const child of planetGlobeGroup.children) {
      if (child.userData?.isCloud) {
        child.rotation.y += 0.0008; // relative to group
      }
    }
  }

  // Animate planet orbits in system view
  if (zoneGroup.visible && !planetGlobeGroup.visible && planetMeshes.length > 0) {
    const t = (time || 0) * 0.0001;
    for (const mesh of planetMeshes) {
      const planet = mesh.userData.planet;
      if (!planet) continue;
      const orbitAU = planet.semi_major_axis / 1000;
      const orbitR = orbitAU * ZONE_SCALE;
      const period = Math.max(1, planet.orbital_period / 1000); // years
      const speed = 1.0 / period; // faster for inner planets
      const baseAngle = (planet.mean_anomaly / 100) * (Math.PI / 180);
      const angle = baseAngle + t * speed * 2;

      // Compute offset for primary star position in binary systems
      let offsetX = 0;
      if (currentSystemData) {
        const starsData = currentSystemData.starsData;
        const companion = starsData?.find(s => !s.is_primary);
        if (companion) {
          const primary = starsData.find(s => s.is_primary);
          offsetX = -((primary?.semi_major_axis || 0) / 1000) * ZONE_SCALE;
        }
      }

      mesh.position.x = offsetX + Math.cos(angle) * orbitR;
      mesh.position.z = Math.sin(angle) * orbitR;
    }
  }

  // Pulse claimed system markers
  for (const mesh of Object.values(claimedMarkers)) {
    mesh.rotation.y += 0.005;
    mesh.material.opacity = 0.2 + Math.sin((time || 0) * 0.003) * 0.1;
  }

  // Twinkle stars in galaxy view — subtle size oscillation
  if (!zoneGroup.visible && frameCount % 3 === 0) {
    const sizeAttr = pointsGeo.attributes.size;
    const t2 = (time || 0) * 0.001;
    for (let i = 0; i < count; i++) {
      const base = 4 + Math.log10(Math.max(1, systems[i]._lum)) * 3;
      const twinkle = Math.sin(t2 + i * 1.7) * 0.3 + Math.sin(t2 * 0.7 + i * 3.1) * 0.2;
      sizeAttr.array[i] = base + twinkle;
    }
    sizeAttr.needsUpdate = true;
  }

  // Refresh lane highlights when camera rotates
  if (selectedIdx >= 0 && laneHighlightGroup.visible) {
    const fwd = new THREE.Vector3();
    camera.getWorldDirection(fwd);
    const angle = Math.atan2(fwd.x, fwd.z);
    if (Math.abs(angle - lastCamAngle) > 0.1) {
      lastCamAngle = angle;
      showLaneHighlights(selectedIdx);
    }
  }

  // Update minimap
  drawMinimap();

  renderer.render(scene, camera);
})();
</script>
