version: "2"
sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "db/migrations"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          # PostGIS geometry: mapped to []byte as a safety net.
          # Queries should never SELECT pos directly — always
          # extract via ST_X/ST_Y/ST_Z and cast to ::integer.
          - db_type: "geometry"
            go_type:
              type: "byte"
              slice: true
            nullable: true
          - db_type: "pg_catalog.int8"
            go_type: "int64"
          - db_type: "pg_catalog.int4"
            go_type: "int32"
          - db_type: "pg_catalog.int2"
            go_type: "int16"
          - db_type: "pg_catalog.bool"
            go_type: "bool"
          - db_type: "pg_catalog.timestamptz"
            go_type: "time.Time"
